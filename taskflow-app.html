<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f12;
  --surface: #17171c;
  --surface2: #1e1e26;
  --surface3: #26262f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --lime: #c8f135;
  --lime-dim: rgba(200,241,53,0.15);
  --rust: #ff5c3a;
  --amber: #ffb547;
  --blue: #5b8af7;
  --green: #42d392;
  --purple: #a78bfa;
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #444455;
  --sidebar: 240px;
  --radius: 14px;
  --radius-sm: 9px;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.logo-dot { width: 8px; height: 8px; background: var(--lime); border-radius: 50%; }

.sidebar-section { padding: 20px 12px 8px; }
.sidebar-section-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text3);
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--lime-dim); color: var(--lime); }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--surface3);
  border-radius: 100px;
  padding: 2px 7px;
  font-size: 10px; font-weight: 600;
  color: var(--text2);
}
.nav-item.active .nav-badge { background: rgba(200,241,53,0.2); color: var(--lime); }

.sidebar-spacer { flex: 1; }

.sidebar-user {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--text); }
.user-role { font-size: 11px; color: var(--text3); }

/* ── MAIN ── */
.main {
  flex: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  flex-shrink: 0;
  background: var(--surface);
}
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text);
}
.topbar-spacer { flex: 1; }

.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 14px;
  width: 220px;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--border2); }
.search-box input {
  background: none; border: none; outline: none;
  font-family: 'Outfit', sans-serif;
  font-size: 13px; color: var(--text);
  width: 100%;
}
.search-box input::placeholder { color: var(--text3); }

.view-toggle {
  display: flex; gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.view-btn {
  padding: 5px 10px; border-radius: 6px;
  border: none; background: none; cursor: pointer;
  color: var(--text2); font-size: 13px;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; gap: 5px;
  font-family: 'Outfit', sans-serif;
}
.view-btn.active { background: var(--surface3); color: var(--text); }
.view-btn:hover:not(.active) { color: var(--text); }

.btn-add {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 18px;
  background: var(--lime);
  color: #0f0f12;
  border: none; border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn-add:hover { background: #b8e020; }
.btn-add:active { transform: scale(0.97); }

/* ── FILTER BAR ── */
.filter-bar {
  padding: 14px 28px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-right: 4px; }
.filter-pill {
  padding: 5px 14px; border-radius: 100px;
  border: 1px solid var(--border); background: none;
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  transition: all 0.15s;
}
.filter-pill:hover { border-color: var(--border2); color: var(--text); }
.filter-pill.active { background: var(--lime-dim); border-color: rgba(200,241,53,0.3); color: var(--lime); }
.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

.sort-select {
  margin-left: auto;
  padding: 5px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2);
  font-family: 'Outfit', sans-serif; font-size: 12px; color: var(--text2);
  cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--border2); }

/* ── CONTENT AREA ── */
.content {
  flex: 1; overflow: hidden;
  position: relative;
}

/* ── KANBAN ── */
.kanban-view {
  height: 100%; overflow-x: auto; overflow-y: hidden;
  padding: 24px 28px;
  display: flex; gap: 16px;
}
.kanban-view::-webkit-scrollbar { height: 6px; }
.kanban-view::-webkit-scrollbar-track { background: transparent; }
.kanban-view::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

.kanban-col {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column;
  max-height: 100%;
}
.kanban-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding: 0 4px;
}
.col-indicator { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-weight: 600; font-size: 13px; color: var(--text); flex: 1; }
.col-count-badge {
  background: var(--surface2);
  border-radius: 100px; padding: 2px 8px;
  font-size: 11px; color: var(--text2); font-weight: 600;
}

.col-tasks {
  flex: 1; overflow-y: auto; padding: 2px 0;
  display: flex; flex-direction: column; gap: 8px;
}
.col-tasks::-webkit-scrollbar { width: 4px; }
.col-tasks::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

/* Task Card */
.task-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  position: relative;
  animation: cardIn 0.25s ease both;
}
.task-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.task-card.dragging { opacity: 0.4; cursor: grabbing; }
.task-card.drag-over { border-color: var(--lime); background: rgba(200,241,53,0.04); }

.card-tag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.card-tag {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 8px; border-radius: 100px;
}
.card-priority {
  margin-left: auto;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 8px; border-radius: 4px;
}

.card-title {
  font-size: 13px; font-weight: 500;
  color: var(--text); line-height: 1.45;
  margin-bottom: 10px;
}
.task-card.done .card-title { text-decoration: line-through; color: var(--text2); }

.card-desc {
  font-size: 11px; color: var(--text2);
  line-height: 1.55; margin-bottom: 10px;
  font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.card-progress { margin-bottom: 10px; }
.progress-bar { height: 3px; background: var(--surface3); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 10px; background: var(--lime); transition: width 0.3s; }
.progress-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.card-due {
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 4px;
}
.card-due.overdue { color: var(--rust); }
.card-due.today { color: var(--amber); }
.card-actions {
  display: flex; gap: 4px; opacity: 0;
  transition: opacity 0.15s;
}
.task-card:hover .card-actions { opacity: 1; }
.card-btn {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  color: var(--text2);
  font-size: 12px;
}
.card-btn:hover { background: var(--surface); border-color: var(--border2); color: var(--text); }
.card-btn.delete:hover { background: rgba(255,92,58,0.15); border-color: rgba(255,92,58,0.3); color: var(--rust); }

/* Drop zone */
.drop-zone {
  min-height: 60px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  margin-top: 4px;
}
.drop-zone:hover,
.drop-zone.drag-over { border-color: rgba(200,241,53,0.4); background: rgba(200,241,53,0.03); color: var(--lime); }

/* ── LIST VIEW ── */
.list-view {
  height: 100%; overflow-y: auto;
  padding: 24px 28px;
}
.list-view::-webkit-scrollbar { width: 6px; }
.list-view::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

.list-group { margin-bottom: 28px; }
.list-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; margin-bottom: 8px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text2); cursor: pointer; user-select: none;
}
.list-group-header:hover { color: var(--text); }
.list-group-toggle { font-size: 10px; transition: transform 0.2s; }
.list-group-toggle.open { transform: rotate(90deg); }

.list-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  transition: border-color 0.15s, background 0.15s;
  cursor: pointer;
  animation: cardIn 0.25s ease both;
}
.list-row:hover { border-color: var(--border2); background: var(--surface3); }

.row-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--surface3);
  flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; position: relative;
}
.row-check:hover { border-color: var(--lime); }
.row-check.checked { background: var(--lime); border-color: var(--lime); }
.row-check.checked::after {
  content: '';
  width: 4px; height: 7px;
  border: 2px solid #0f0f12;
  border-top: none; border-left: none;
  transform: rotate(45deg) translateY(-1px);
}

.row-title {
  flex: 1; font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row-title.done { text-decoration: line-through; color: var(--text2); }
.row-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 2px 8px; border-radius: 100px;
  flex-shrink: 0;
}
.row-priority { font-size: 10px; flex-shrink: 0; }
.row-due { font-size: 11px; color: var(--text3); flex-shrink: 0; min-width: 80px; text-align: right; }
.row-due.overdue { color: var(--rust); }
.row-due.today { color: var(--amber); }
.row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.list-row:hover .row-actions { opacity: 1; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 32px;
  width: 100%; max-width: 520px;
  transform: translateY(16px) scale(0.98);
  transition: transform 0.2s;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 0.04em;
  margin-bottom: 24px; color: var(--text);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 16px;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--surface3); color: var(--text); }

.form-group { margin-bottom: 18px; }
.form-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text3); margin-bottom: 8px; display: block;
}
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 11px 14px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif; font-size: 13px;
  color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: rgba(200,241,53,0.5); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }
.form-select option { background: var(--surface2); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-cancel {
  padding: 10px 22px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: none;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text2); cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn-cancel:hover { background: var(--surface2); color: var(--text); }
.btn-save {
  padding: 10px 28px; border-radius: var(--radius-sm);
  border: none; background: var(--lime);
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700;
  color: #0f0f12; cursor: pointer;
  transition: background 0.15s;
}
.btn-save:hover { background: #b8e020; }

/* Range slider for progress */
.form-range {
  width: 100%; accent-color: var(--lime);
  cursor: pointer;
}
.range-value { text-align: right; font-size: 12px; color: var(--lime); font-weight: 600; margin-top: 4px; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 200px; gap: 10px; color: var(--text3);
}
.empty-icon { font-size: 32px; opacity: 0.4; }
.empty-text { font-size: 13px; }

/* ── STATS BAR ── */
.stats-bar {
  padding: 10px 28px;
  border-top: 1px solid var(--border);
  display: flex; gap: 28px; align-items: center;
  background: var(--surface); flex-shrink: 0;
}
.stat-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
.stat-item strong { color: var(--text); font-weight: 600; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── TOAST ── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 13px; font-weight: 500;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn 0.3s ease both;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.success { border-color: rgba(66,211,146,0.3); }
.toast.error { border-color: rgba(255,92,58,0.3); }

/* ── COLORS ── */
.tag-design { background: rgba(91,138,247,0.15); color: #5b8af7; }
.tag-dev { background: rgba(200,241,53,0.15); color: #8ab200; }
.tag-marketing { background: rgba(255,181,71,0.15); color: #ffb547; }
.tag-research { background: rgba(167,139,250,0.15); color: #a78bfa; }
.tag-other { background: rgba(136,136,160,0.15); color: #8888a0; }

.pri-high { background: rgba(255,92,58,0.15); color: #ff5c3a; }
.pri-medium { background: rgba(255,181,71,0.15); color: #ffb547; }
.pri-low { background: rgba(66,211,146,0.15); color: #42d392; }

/* Column colors */
.col-todo .col-indicator { background: #8888a0; }
.col-inprogress .col-indicator { background: var(--amber); }
.col-review .col-indicator { background: var(--blue); }
.col-done .col-indicator { background: var(--green); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(16px); }
  to { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div> TASKFLOW</div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Workspace</div>
    <div class="nav-item active" data-filter="all" onclick="setFilter('all')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      All Tasks
      <span class="nav-badge" id="badge-all">0</span>
    </div>
    <div class="nav-item" data-filter="today" onclick="setFilter('today')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Due Today
      <span class="nav-badge" id="badge-today">0</span>
    </div>
    <div class="nav-item" data-filter="overdue" onclick="setFilter('overdue')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Overdue
      <span class="nav-badge" id="badge-overdue">0</span>
    </div>
    <div class="nav-item" data-filter="done" onclick="setFilter('done')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Completed

      Design
      <span class="nav-badge" id="badge-design">0</span>

    <div class="nav-item" data-filter="cat-dev" onclick="setFilter('cat-dev')">
      <span style="width:8px;height:8px;border-radius:50%;background:#8ab200;display:inline-block"></span>
      Development
      <span class="nav-badge" id="badge-dev">0</span>

    <div class="nav-item" data-filter="cat-marketing" onclick="setFilter('cat-marketing')">
      <span style="width:8px;height:8px;border-radius:50%;background:#ffb547;display:inline-block"></span>
      Marketing

      <span style="width:8px;height:8px;border-radius:50%;background:#a78bfa;display:inline-block"></span>
      Research
      <span class="nav-badge" id="badge-research">0</span>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-user">

    <div>
      <div class="user-name">Alex Johnson</div>

    </div>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">All Tasks</div>
    <div class="topbar-spacer"></div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#444455" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search tasks…" oninput="renderAll()">
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="view-kanban" onclick="setView('kanban')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="11"/></svg>
        Board
      </button>
      <button class="view-btn" id="view-list" onclick="setView('list')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        List
      </button>
    </div>
    <button class="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add Task
    </button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Priority:</span>
    <button class="filter-pill active" data-priority="" onclick="setPriority('')">All</button>
    <button class="filter-pill" data-priority="high" onclick="setPriority('high')">🔴 High</button>
    <button class="filter-pill" data-priority="medium" onclick="setPriority('medium')">🟡 Medium</button>
    <button class="filter-pill" data-priority="low" onclick="setPriority('low')">🟢 Low</button>
    <div class="filter-sep"></div>
    <select class="sort-select" id="sort-select" onchange="renderAll()">
      <option value="created">Sort: Date Created</option>
      <option value="due">Sort: Due Date</option>
      <option value="priority">Sort: Priority</option>
      <option value="title">Sort: Title A–Z</option>

  </div>

  <div class="content">
    <div id="kanban-view" class="kanban-view"></div>
    <div id="list-view" class="list-view" style="display:none"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-dot" style="background:#8888a0"></div> To Do: <strong id="s-todo">0</strong></div>
    <div class="stat-item"><div class="stat-dot" style="background:#ffb547"></div> In Progress: <strong id="s-inprogress">0</strong></div>
    <div class="stat-item"><div class="stat-dot" style="background:#5b8af7"></div> In Review: <strong id="s-review">0</strong></div>
    <div class="stat-item"><div class="stat-dot" style="background:#42d392"></div> Done: <strong id="s-done">0</strong></div>
    <div class="stat-item" style="margin-left:auto">Total: <strong id="s-total">0</strong></div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-title">
      <span id="modal-title-text">New Task</span>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="f-title" placeholder="What needs to be done?" />
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Add more context…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="f-category">
          <option value="design">Design</option>
          <option value="dev">Development</option>
          <option value="marketing">Marketing</option>
          <option value="research">Research</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="todo">To Do</option>
          <option value="inprogress">In Progress</option>
          <option value="review">In Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="f-due" type="date" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Progress: <span id="progress-val">0</span>%</label>
      <input class="form-range" type="range" id="f-progress" min="0" max="100" value="0"
        oninput="document.getElementById('progress-val').textContent=this.value">
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── STATE ──
let tasks = JSON.parse(localStorage.getItem('taskflow-tasks') || 'null') || [
  { id: 1, title: 'Redesign dashboard UI components for v2.0', desc: 'Update all core dashboard widgets to match new design system.', category: 'design', priority: 'high', status: 'inprogress', due: '2026-03-04', progress: 65, created: Date.now() - 86400000*3 },
  { id: 2, title: 'Write API documentation for auth endpoints', desc: 'Cover OAuth 2.0, JWT refresh tokens, and error codes.', category: 'dev', priority: 'medium', status: 'inprogress', due: '2026-03-04', progress: 30, created: Date.now() - 86400000*2 },
  { id: 3, title: 'Send weekly progress report to stakeholders', desc: '', category: 'marketing', priority: 'low', status: 'done', due: '2026-03-03', progress: 100, created: Date.now() - 86400000*5 },
  { id: 4, title: 'Conduct user interviews for Q2 feature planning', desc: 'Schedule 8 interviews with power users across enterprise tier.', category: 'research', priority: 'high', status: 'todo', due: '2026-03-10', progress: 0, created: Date.now() - 86400000*1 },
  { id: 5, title: 'Fix mobile responsive layout on landing page', desc: 'Issues on viewport 375px and below.', category: 'dev', priority: 'high', status: 'review', due: '2026-03-05', progress: 85, created: Date.now() - 86400000*4 },
  { id: 6, title: 'Create Q2 marketing campaign brief', desc: '', category: 'marketing', priority: 'medium', status: 'todo', due: '2026-03-12', progress: 0, created: Date.now() - 86400000*1 },
  { id: 7, title: 'Design new onboarding flow screens', desc: 'Based on UX research from Jan interviews.', category: 'design', priority: 'medium', status: 'todo', due: '2026-03-08', progress: 10, created: Date.now() },
  { id: 8, title: 'Competitor analysis report', desc: '', category: 'research', priority: 'low', status: 'done', due: '2026-02-28', progress: 100, created: Date.now() - 86400000*7 },
];

let currentView = 'kanban';
let currentFilter = 'all';
let currentPriority = '';
let dragId = null;
let nextId = Math.max(...tasks.map(t=>t.id)) + 1;

function save() { localStorage.setItem('taskflow-tasks', JSON.stringify(tasks)); }

// ── FILTER / SORT ──
function getFilteredTasks() {
  const today = new Date().toISOString().split('T')[0];
  const search = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let list = tasks.filter(t => {
    if (search && !t.title.toLowerCase().includes(search) && !t.desc.toLowerCase().includes(search)) return false;
    if (currentPriority && t.priority !== currentPriority) return false;
    switch (currentFilter) {
      case 'today': return t.due === today && t.status !== 'done';
      case 'overdue': return t.due && t.due < today && t.status !== 'done';
      case 'done': return t.status === 'done';
      case 'cat-design': return t.category === 'design';
      case 'cat-dev': return t.category === 'dev';
      case 'cat-marketing': return t.category === 'marketing';
      case 'cat-research': return t.category === 'research';
      default: return true;
    }
  });

  const priOrder = { high: 0, medium: 1, low: 2 };
  list.sort((a,b) => {
    if (sort === 'due') return (a.due||'9999') < (b.due||'9999') ? -1 : 1;
    if (sort === 'priority') return priOrder[a.priority] - priOrder[b.priority];
    if (sort === 'title') return a.title.localeCompare(b.title);
    return b.created - a.created;
  });
  return list;
}

// ── RENDER ──
function renderAll() {
  updateBadges();
  updateStats();
  if (currentView === 'kanban') renderKanban();
  else renderList();
}

const COLUMNS = [
  { id: 'todo', label: 'To Do', cls: 'col-todo' },
  { id: 'inprogress', label: 'In Progress', cls: 'col-inprogress' },
  { id: 'review', label: 'In Review', cls: 'col-review' },
  { id: 'done', label: 'Done', cls: 'col-done' },
];

function renderKanban() {
  const filtered = getFilteredTasks();
  const el = document.getElementById('kanban-view');
  el.innerHTML = '';

  COLUMNS.forEach(col => {
    const colTasks = filtered.filter(t => t.status === col.id);
    const div = document.createElement('div');
    div.className = `kanban-col ${col.cls}`;
    div.innerHTML = `
      <div class="kanban-col-head">
        <div class="col-indicator"></div>
        <div class="col-title">${col.label}</div>
        <div class="col-count-badge">${colTasks.length}</div>
      </div>
      <div class="col-tasks" id="col-${col.id}" ondragover="onDragOver(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')" ondragleave="onDragLeave(event)">
        ${colTasks.length === 0 ? '<div class="empty-state"><div class="empty-icon">○</div><div class="empty-text">No tasks here</div></div>' : colTasks.map(t => taskCardHTML(t)).join('')}
        <div class="drop-zone" ondragover="onDragOver(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')" ondragleave="onDragLeave(event)" onclick="openModal(null,'${col.id}')">+ Add task</div>
      </div>
    `;
    el.appendChild(div);
  });

  // Bind drag events
  el.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = parseInt(card.dataset.id);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });
}

function taskCardHTML(t) {
  const today = new Date().toISOString().split('T')[0];
  const overdue = t.due && t.due < today && t.status !== 'done';
  const isToday = t.due === today;
  const dueClass = overdue ? 'overdue' : isToday ? 'today' : '';
  const dueLabel = t.due ? formatDate(t.due) : '—';
  return `
    <div class="task-card${t.status==='done'?' done':''}" data-id="${t.id}" draggable="true">
      <div class="card-tag-row">
        <span class="card-tag tag-${t.category}">${t.category}</span>
        <span class="card-priority pri-${t.priority}">${t.priority}</span>
      </div>
      <div class="card-title">${escHtml(t.title)}</div>
      ${t.desc ? `<div class="card-desc">${escHtml(t.desc)}</div>` : ''}
      ${t.progress > 0 ? `
        <div class="card-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${t.progress}%"></div></div>
          <div class="progress-label">${t.progress}% complete</div>
        </div>` : ''}
      <div class="card-footer">
        <div class="card-due ${dueClass}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${dueLabel}
        </div>
        <div class="card-actions">
          <div class="card-btn" title="Toggle done" onclick="toggleDone(${t.id})">✓</div>
          <div class="card-btn" title="Edit" onclick="openModal(${t.id})">✎</div>
          <div class="card-btn delete" title="Delete" onclick="deleteTask(${t.id})">✕</div>
        </div>
      </div>
    </div>`;
}

function renderList() {
  const filtered = getFilteredTasks();
  const el = document.getElementById('list-view');
  el.innerHTML = '';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state" style="height:300px"><div class="empty-icon">🎯</div><div class="empty-text">No tasks match your filters</div></div>';
    return;
  }

  // Group by status
  const groups = [
    { id: 'inprogress', label: 'In Progress', color: '#ffb547' },
    { id: 'todo', label: 'To Do', color: '#8888a0' },
    { id: 'review', label: 'In Review', color: '#5b8af7' },
    { id: 'done', label: 'Done', color: '#42d392' },
  ];

  groups.forEach(g => {
    const gTasks = filtered.filter(t => t.status === g.id);
    if (!gTasks.length) return;

    const section = document.createElement('div');
    section.className = 'list-group';
    section.innerHTML = `
      <div class="list-group-header" onclick="toggleGroup(this)">
        <span class="list-group-toggle open">▶</span>
        <span style="color:${g.color}">●</span>
        ${g.label}
        <span style="margin-left:4px;color:var(--text3)">(${gTasks.length})</span>
      </div>
      <div class="list-rows">
        ${gTasks.map(t => listRowHTML(t)).join('')}
      </div>`;
    el.appendChild(section);
  });
}

function listRowHTML(t) {
  const today = new Date().toISOString().split('T')[0];
  const overdue = t.due && t.due < today && t.status !== 'done';
  const isToday = t.due === today;
  const dueClass = overdue ? 'overdue' : isToday ? 'today' : '';
  return `
    <div class="list-row" data-id="${t.id}">
      <div class="row-check ${t.status==='done'?'checked':''}" onclick="toggleDone(${t.id})"></div>
      <div class="row-title ${t.status==='done'?'done':''}">${escHtml(t.title)}</div>
      <span class="row-tag tag-${t.category}">${t.category}</span>
      <span class="row-priority pri-${t.priority}" style="font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700">
        ${t.priority}
      </span>
      <div class="row-due ${dueClass}">${t.due ? formatDate(t.due) : '—'}</div>
      <div class="row-actions">
        <div class="card-btn" onclick="openModal(${t.id})">✎</div>
        <div class="card-btn delete" onclick="deleteTask(${t.id})">✕</div>
      </div>
    </div>`;
}

// ── DRAG & DROP ──
function onDragOver(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragId === null) return;
  const task = tasks.find(t => t.id === dragId);
  if (task && task.status !== colId) {
    task.status = colId;
    if (colId === 'done') task.progress = 100;
    save(); renderAll();
    toast(`Moved to "${COLUMNS.find(c=>c.id===colId).label}"`, 'success');
  }
  dragId = null;
}

// ── MODAL ──
let editMode = false;
function openModal(id = null, defaultStatus = 'todo') {
  editMode = !!id;
  document.getElementById('modal-title-text').textContent = id ? 'Edit Task' : 'New Task';
  document.getElementById('edit-id').value = id || '';

  if (id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-desc').value = t.desc;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-priority').value = t.priority;
    document.getElementById('f-status').value = t.status;
    document.getElementById('f-due').value = t.due || '';
    document.getElementById('f-progress').value = t.progress;
    document.getElementById('progress-val').textContent = t.progress;
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-category').value = 'design';
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-status').value = defaultStatus;
    document.getElementById('f-due').value = '';
    document.getElementById('f-progress').value = 0;
    document.getElementById('progress-val').textContent = 0;
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 200);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor = 'var(--rust)'; return; }
  document.getElementById('f-title').style.borderColor = '';

  const id = parseInt(document.getElementById('edit-id').value);
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    category: document.getElementById('f-category').value,
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    due: document.getElementById('f-due').value,
    progress: parseInt(document.getElementById('f-progress').value),
  };

  if (id) {
    const idx = tasks.findIndex(t => t.id === id);
    tasks[idx] = { ...tasks[idx], ...data };
    toast('Task updated!', 'success');
  } else {
    tasks.unshift({ id: nextId++, ...data, created: Date.now() });
    toast('Task created!', 'success');
  }

  save(); closeModal(); renderAll();
}

// ── ACTIONS ──
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); renderAll();
  toast('Task deleted', '');
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  if (t.status === 'done') t.progress = 100;
  save(); renderAll();
}

function toggleGroup(header) {
  const toggle = header.querySelector('.list-group-toggle');
  const rows = header.nextElementSibling;
  const isOpen = toggle.classList.contains('open');
  toggle.classList.toggle('open', !isOpen);
  rows.style.display = isOpen ? 'none' : '';
}

// ── FILTER / VIEW ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === f);
  });
  const labels = { all:'All Tasks', today:'Due Today', overdue:'Overdue', done:'Completed', 'cat-design':'Design', 'cat-dev':'Development', 'cat-marketing':'Marketing', 'cat-research':'Research' };
  document.getElementById('topbar-title').textContent = labels[f] || 'Tasks';
  renderAll();
}

function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.filter-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.priority === p);
  });
  renderAll();
}

function setView(v) {
  currentView = v;
  document.getElementById('kanban-view').style.display = v === 'kanban' ? 'flex' : 'none';
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('view-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  renderAll();
}

// ── BADGES & STATS ──
function updateBadges() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('badge-all').textContent = tasks.filter(t=>t.status!=='done').length;
  document.getElementById('badge-today').textContent = tasks.filter(t=>t.due===today&&t.status!=='done').length;
  document.getElementById('badge-overdue').textContent = tasks.filter(t=>t.due&&t.due<today&&t.status!=='done').length;
  document.getElementById('badge-done').textContent = tasks.filter(t=>t.status==='done').length;
  document.getElementById('badge-design').textContent = tasks.filter(t=>t.category==='design').length;
  document.getElementById('badge-dev').textContent = tasks.filter(t=>t.category==='dev').length;
  document.getElementById('badge-marketing').textContent = tasks.filter(t=>t.category==='marketing').length;
  document.getElementById('badge-research').textContent = tasks.filter(t=>t.category==='research').length;
}

function updateStats() {
  document.getElementById('s-todo').textContent = tasks.filter(t=>t.status==='todo').length;
  document.getElementById('s-inprogress').textContent = tasks.filter(t=>t.status==='inprogress').length;
  document.getElementById('s-review').textContent = tasks.filter(t=>t.status==='review').length;
  document.getElementById('s-done').textContent = tasks.filter(t=>t.status==='done').length;
  document.getElementById('s-total').textContent = tasks.length;
}

// ── TOAST ──
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', '': '○' };
  el.innerHTML = `<span style="color:${type==='success'?'var(--green)':type==='error'?'var(--rust)':'var(--text2)'}">${icons[type]}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search-input').focus(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openModal(); }
});

// ── UTILS ──
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) {
  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now()+86400000).toISOString().split('T')[0];
  if (d === today) return 'Today';
  if (d === tomorrow) return 'Tomorrow';
  const [y,m,dy] = d.split('-');
  return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+dy}`;
}

// ── INIT ──
renderAll();
</script>
</body>
